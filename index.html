<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Archive | 9 Months</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;1,400&family=Montserrat:wght@200;400&display=swap" rel="stylesheet">
    <style>
        :root { --white: #FFFFFF; --black: #000000; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--black); color: var(--white); overflow: hidden; font-family: 'Montserrat', sans-serif; -webkit-font-smoothing: antialiased; }

        .screen { position: fixed; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; opacity: 0; visibility: hidden; z-index: 10; }
        .active { opacity: 1; visibility: visible; transition: opacity 2.5s ease-in-out; }
        .fade-out { opacity: 0 !important; transition: opacity 2s ease-in-out; }

        .italian-serif { font-family: 'Bodoni Moda', serif; font-style: italic; font-size: 2.2rem; letter-spacing: -0.5px; font-weight: 400; line-height: 1.4; }
        #rewind-number { font-family: 'Bodoni Moda', serif; font-size: 9rem; font-weight: 400; line-height: 1; z-index: 50; text-shadow: 0 0 40px rgba(0,0,0,0.9); }

        .video-wrapper { position: absolute; inset: 0; z-index: 5; background: #000; }
        .blurred { filter: blur(25px) brightness(0.4); }
        
        video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 1.5s ease-in-out; pointer-events: none; }
        video.playing { opacity: 1; }

        .overlay-text { 
            position: absolute; 
            bottom: 25%;
            z-index: 60; 
            font-family: 'Bodoni Moda', serif; 
            font-style: italic; 
            font-size: 1.8rem; 
            opacity: 0; 
            transition: opacity 1.5s ease; 
            pointer-events: none; 
            text-shadow: 2px 2px 20px rgba(0,0,0,0.9); 
            padding: 0 30px;
        }
        .show-text { opacity: 1; }

        .scrim { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 60%, rgba(0,0,0,0.5) 100%); z-index: 15; pointer-events: none; }
        .month-display { position: absolute; top: 40px; font-family: 'Bodoni Moda', serif; font-size: 0.8rem; letter-spacing: 5px; z-index: 70; opacity: 0.5; }
        
        #starfield { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; transition: opacity 4s ease-in-out; background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%); z-index: 5; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.5; animation: twinkle var(--duration) infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } }
    </style>
</head>
<body id="body-main">

    <audio id="bg-music" src="song.m4a" preload="auto" playsinline></audio>

    <div id="screen-init" class="screen active" onclick="initiate()">
        <div style="font-size: 0.6rem; letter-spacing: 4px; opacity: 0.3;">TAP TO BEGIN</div>
    </div>
    
    <div id="screen-intro-1" class="screen"><div class="italian-serif">Hi bubs,</div></div>
    <div id="screen-intro-2" class="screen"><div class="italian-serif">let's take a look at our journey</div></div>

    <div id="screen-rewind" class="screen">
        <div id="rewind-number">274</div>
        <div style="font-size: 0.6rem; letter-spacing: 6px; margin-top: 20px; z-index: 50; opacity: 0.6;">REWINDING TIME</div>
        <div class="video-wrapper blurred">
            <video id="rev-vid-1" muted playsinline class="playing"></video>
            <video id="rev-vid-2" muted playsinline></video>
        </div>
    </div>

    <div id="screen-video" class="screen">
        <div class="month-display" id="month-label">01 / 13</div>
        <div id="v-overlay" class="overlay-text"></div>
        <div class="scrim"></div>
        <div class="video-wrapper">
            <video id="main-vid-1" muted playsinline class="playing"></video>
            <video id="main-vid-2" muted playsinline></video>
        </div>
    </div>

    <div id="screen-outro-1" class="screen"><div class="italian-serif">9 months together</div></div>
    <div id="screen-outro-2" class="screen"><div class="italian-serif">a thousand fights</div></div>
    <div id="screen-outro-3" class="screen"><div class="italian-serif">days we cried</div></div>
    <div id="screen-outro-4" class="screen"><div class="italian-serif">days we laughed</div></div>
    <div id="screen-outro-5" class="screen"><div class="italian-serif">but we always stayed together</div></div>

    <div id="screen-final" class="screen">
        <div id="starfield"></div>
        <div class="italian-serif" style="z-index: 20;">i love you my princess</div>
    </div>

    <script>
        let currentMonth = 0;
        let isStarted = false;
        let audioCtx;
        let videoData = [
            { s: "1.mp4", t: "The day we met, I fell in love." }, 
            { s: "2.mp4", t: "Everything felt magical, and your hair was beautiful." }, 
            { s: "3.mp4", t: "Then we met again, first time as a couple." },
            { s: "4.mp4", t: "Every second with you counts." }, 
            { s: "5.mp4", t: "And then we kissed, OMG." }, 
            { s: "6.mp4", t: "Then we met, again and again. And every time we met, I fell more in love." },
            { s: "7.mp4", t: "Every day with you felt more and more magical." }, 
            { s: "8.mp4", t: "Yeah we fought, but we stayed together." }, 
            { s: "9.mp4", t: "And no matter where we are..." },
            { s: "10.mp4", t: "I promise to be with you always." }, 
            { s: "11.mp4", t: "I'll always listen to your problems." }, 
            { s: "12.mp4", t: "And I will be your Spidey." },
            { s: "13.mp4", t: "I love you." }
        ];

        function playZenBell() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = 'sine'; osc.frequency.setValueAtTime(440, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 3);
                osc.start(); osc.stop(audioCtx.currentTime + 3);
            } catch(e) {}
        }

        function createStars() {
            const field = document.getElementById('starfield');
            for (let i = 0; i < 150; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 2 + 'px';
                star.style.width = size;
                star.style.height = size;
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--duration', Math.random() * 3 + 2 + 's');
                field.appendChild(star);
            }
        }

        function sw(id, delay = 0) {
            let active = document.querySelector('.screen.active');
            if (active) active.classList.add('fade-out');
            setTimeout(() => {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active', 'fade-out'));
                const target = document.getElementById(id);
                if(target) target.classList.add('active');
            }, 2500 + delay);
        }

        function initiate() {
            if (isStarted) return;
            isStarted = true;

            const vids = document.querySelectorAll('video');
            vids.forEach(v => {
                v.load(); // Force reset source
                v.play().then(() => v.pause()).catch(() => {});
            });

            createStars();
            sw('screen-intro-1');
            setTimeout(() => sw('screen-intro-2'), 4500);
            setTimeout(() => startRewind(), 9000);
        }

        function startRewind() {
            sw('screen-rewind');
            let v1 = document.getElementById('rev-vid-1');
            let v2 = document.getElementById('rev-vid-2');
            let num = document.getElementById('rewind-number');
            let count = 274;
            let vidIdx = 12;
            let currentV = v1;

            v1.src = videoData[vidIdx].s;
            v1.playbackRate = 4.0;
            v1.play().catch(() => {});

            setTimeout(() => {
                let interval = setInterval(() => {
                    count--;
                    num.innerText = count;
                    if (count % 21 === 0 && vidIdx > 0) {
                        vidIdx--;
                        let nextV = (currentV === v1) ? v2 : v1;
                        nextV.src = videoData[vidIdx].s;
                        nextV.playbackRate = 4.0;
                        nextV.onloadeddata = () => {
                            nextV.play().catch(() => {});
                            nextV.classList.add('playing');
                            currentV.classList.remove('playing');
                            currentV = nextV;
                        };
                    }
                    if (count <= 1) {
                        clearInterval(interval);
                        playZenBell();
                        setTimeout(() => {
                            document.getElementById('screen-rewind').classList.add('fade-out');
                            setTimeout(() => startArchive(), 2000);
                        }, 2000);
                    }
                }, 40);
            }, 2500);
        }

        function startArchive() {
            const music = document.getElementById('bg-music');
            music.currentTime = 82;
            music.volume = 0.5;
            music.play().catch(() => {
                // Fallback for strict mobile browsers
                window.addEventListener('touchstart', () => music.play(), {once: true});
            });

            load(0);
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active', 'fade-out'));
            document.getElementById('screen-video').classList.add('active');
        }

        function load(idx) {
            if (idx >= videoData.length) { runOutro(); return; }
            currentMonth = idx;
            
            let v1 = document.getElementById('main-vid-1');
            let v2 = document.getElementById('main-vid-2');
            let activeV = v1.classList.contains('playing') ? v1 : v2;
            let nextV = v1.classList.contains('playing') ? v2 : v1;

            const overlay = document.getElementById('v-overlay');
            overlay.classList.remove('show-text');
            
            nextV.src = videoData[idx].s;
            nextV.load(); // Force mobile to recognize new source

            nextV.oncanplay = () => {
                document.getElementById('month-label').innerText = `${String(idx + 1).padStart(2, '0')} / 13`;
                overlay.innerText = videoData[idx].t;
                
                // Explicitly call play for mobile
                let playPromise = nextV.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        nextV.classList.add('playing');
                        activeV.classList.remove('playing');
                    }).catch(error => {
                        console.log("Mobile playback failed, retrying...");
                        nextV.play();
                    });
                }

                setTimeout(() => overlay.classList.add('show-text'), 1200);
                setTimeout(() => overlay.classList.remove('show-text'), 5500);

                let timer = setTimeout(() => { load(idx + 1); }, 7000);
                nextV.onended = () => { clearTimeout(timer); load(idx + 1); };
            };
        }

        function runOutro() {
            sw('screen-outro-1');
            setTimeout(() => sw('screen-outro-2'), 4500);
            setTimeout(() => sw('screen-outro-3'), 9000);
            setTimeout(() => sw('screen-outro-4'), 13500);
            setTimeout(() => sw('screen-outro-5'), 18000);
            setTimeout(() => {
                sw('screen-final');
                document.getElementById('starfield').style.opacity = "1";
            }, 22500);
        }
    </script>
</body>
</html>
